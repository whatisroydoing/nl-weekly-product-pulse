name: CI - Test Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Install Playwright Browsers
      run: |
        playwright install chromium
        playwright install-deps chromium
        
    - name: Run Python tests
      env:
        PYTHONPATH: ${{ github.workspace }}
        OPENAI_API_KEY: "sk-fake-key"
        GMAIL_APP_PASSWORD: "fake-password"
        GMAIL_USER: "test@gmail.com"
        GOOGLE_DOC_ID: "fake-doc-id"
        GOOGLE_SERVICE_ACCOUNT_JSON: "fake-key.json"
      run: |
        pytest tests/ -v

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: module_e/frontend/package-lock.json
        
    - name: Install dependencies
      run: |
        cd module_e/frontend
        npm ci
        
    - name: Run Vitest
      run: |
        cd module_e/frontend
        npm run test -- --run # Run once, don't watch
